apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 3tirewebapp-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/hansessay/gitops-configs.git
    targetRevision: HEAD
    path: helm-charts/3tirewebapp

  destination:
    server: https://kubernetes.default.svc
    namespace: 3tirewebapp-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true