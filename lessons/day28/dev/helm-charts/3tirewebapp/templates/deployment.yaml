62apiVersion: apps/v1
kind: Deployment
metadata:
  name: threetirewebapp
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: threetirewebapp
  template:
    metadata:
      labels:
        app: app: threetirewebapp
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
