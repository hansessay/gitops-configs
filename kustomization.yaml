# Centralized image management
images:
  - name: piyushasachdeva/frontend
    newName: cheikhfall/frontend
    newTag: v1.0.0
  - name: piyushasachdeva/backend
    newName: cheikhfall/backend
    newTag: latest
  - name: postgres
    newTag: "15"

# Resource configurations - replica scaling only
replicas:
  - name: frontend
    count: 1
  - name: backend
    count: 2
  - name: postgres
    count: 1