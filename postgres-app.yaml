apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hansessay/gitops-configs.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: 3tirewebapp-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
