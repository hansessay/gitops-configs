name: DevSecOps CI

on:
  push:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/aks-devsecops-app:${{ env.IMAGE_TAG }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/aks-devsecops-app:${{ env.IMAGE_TAG }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          format: 'table'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/aks-devsecops-app:${{ env.IMAGE_TAG }}

      - name: Update Kubernetes manifest image
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/aks-devsecops-app:${{ env.IMAGE_TAG }}|g" kubernetes/manifests/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add kubernetes/manifests/deployment.yaml
          git commit -m "ci: update image tag to ${{ env.IMAGE_TAG }}" || echo "No changes to commit"
          git push