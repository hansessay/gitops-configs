File name:
.github/workflows/build-scan-push-update-gitops.yml

---

```yaml
name: Build Scan Push Update GitOps

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: aks-devsecops-app
  GITOPS_REPO: hansessay/gitops-configs
  GITOPS_BRANCH: main
  MANIFEST_FILE: apps/backend/deployment.yaml

jobs:
  build-scan-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
          ref: ${{ env.GITOPS_BRANCH }}

      - name: Update image tag in GitOps repo
        run: |
          cd gitops
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" ${{ env.MANIFEST_FILE }}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ${{ env.MANIFEST_FILE }}
          git commit -m "ci: update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push
```

---

Required GitHub Secrets:

* DOCKERHUB_USERNAME
* DOCKERHUB_TOKEN
* GITOPS_TOKEN
