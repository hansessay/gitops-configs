apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-assistant-sa
  namespace: 3tirewebapp-dev

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-assistant-reader
  namespace: 3tirewebapp-dev
rules:
- apiGroups: [""]
  resources: ["pods", "services", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-assistant-reader-binding
  namespace: 3tirewebapp-dev
subjects:
- kind: ServiceAccount
  name: ai-assistant-sa
  namespace: 3tirewebapp-dev
roleRef:
  kind: Role
  name: ai-assistant-reader
  apiGroup: rbac.authorization.k8s.io
